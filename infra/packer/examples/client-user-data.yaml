#cloud-config

users:
  - name: ubuntu
    plain_text_passwd: ubuntu
    lock_passwd: false
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    ssh_authorized_keys:
      - ssh-ed25519 AAAA...substitua-pela-sua-chave-publica... user@host

ssh_pwauth: false

write_files:
  - path: /opt/lunae/backend/.env
    owner: lunae:lunae
    permissions: '0640'
    content: |
      # Banco de dados
      POSTGRES_DB=lunae
      POSTGRES_USER=fev-23
      POSTGRES_PASSWORD=TROQUE-ME
      POSTGRES_HOST=10.0.0.10
      POSTGRES_PORT=5432

      # Django
      SECRET_KEY=gere-uma-chave-aleatoria-aqui
      DEBUG=False
      ALLOWED_HOSTS=lunae.exemplo.com,127.0.0.1,localhost
