name: Build Lunae VM image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versão da imagem (vira parte do nome do arquivo no bucket)"
        required: true
        default: "dev"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      VERSION: ${{ github.event.inputs.version }}
      IMAGE_FILE: lunae-${{ github.event.inputs.version }}.qcow2
      # OCI Object Storage — preencher como GitHub Secrets
      OCI_CLI_USER:        ${{ secrets.OCI_USER_OCID }}
      OCI_CLI_TENANCY:     ${{ secrets.OCI_TENANCY_OCID }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_CLI_REGION:      ${{ secrets.OCI_REGION }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY }}
      OCI_NAMESPACE:       ${{ secrets.OCI_NAMESPACE }}
      OCI_BUCKET:          ${{ secrets.OCI_BUCKET }}

    steps:
      # ─── 1. Checkout (com submódulos: back + front) ──────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ─── 2. Build do frontend ────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend (Vite)
        working-directory: API_5_SEM_FRONT
        env:
          VITE_API_URL:
        run: |
          npm ci
          npm run build

      # ─── 3. Empacotar back + front em tarballs (no lugar certo) ──────
      # Packer roda com working-directory=infra/packer, então os paths
      # do HCL são `./files/*.tar.gz`. Geramos os tarballs lá.
      - name: Pack backend tarball
        run: |
          mkdir -p infra/packer/files
          tar --exclude='.venv' \
              --exclude='venv' \
              --exclude='__pycache__' \
              --exclude='.git' \
              --exclude='.pytest_cache' \
              --exclude='loadtests' \
              --exclude='docs' \
              --exclude='.coverage' \
              --exclude='coverage.xml' \
              --transform 's,^API_5_SEM_BACK,API_5_SEM_BACK,' \
              -czf infra/packer/files/backend.tar.gz \
              API_5_SEM_BACK

      - name: Pack frontend tarball
        run: |
          mkdir -p infra/packer/files
          tar -czf infra/packer/files/frontend.tar.gz -C API_5_SEM_FRONT/dist .

      # ─── 4. Instalar Packer + QEMU/KVM no runner ─────────────────────
      - name: Install QEMU/KVM
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils ovmf
          # Conferir que /dev/kvm é acessível (runners ubuntu-latest têm)
          ls -l /dev/kvm
          sudo usermod -aG kvm "$USER"

      - name: Install Packer
        uses: hashicorp/setup-packer@v3
        with:
          version: "1.11.2"

      # ─── 5. Chave SSH efêmera + cloud-init/user-data ─────────────────
      - name: Generate ephemeral SSH key and user-data
        run: |
          mkdir -p infra/packer/keys
          ssh-keygen -t ed25519 -N "" \
            -f infra/packer/keys/packer.pem \
            -C "packer-build"
          # ssh-keygen cria packer.pem.pub — padroniza pra .pub
          mv infra/packer/keys/packer.pem.pub infra/packer/keys/packer.pub
          chmod 600 infra/packer/keys/packer.pem

          PUB_KEY=$(cat infra/packer/keys/packer.pub)
          # Gera user-data a partir do .example (substitui placeholder)
          sed "s|SSH_PUBLIC_KEY_PLACEHOLDER|${PUB_KEY}|" \
            infra/packer/cloud-init/user-data.example \
            > infra/packer/cloud-init/user-data

      # ─── 6. Baixar imagem cloud base do Debian ───────────────────────
      - name: Download Debian cloud image
        working-directory: infra/packer
        run: |
          curl -fsSL -o debian-12-genericcloud-amd64.qcow2 \
            https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-genericcloud-amd64.qcow2

      # ─── 7. Build da imagem ──────────────────────────────────────────
      - name: Packer init
        working-directory: infra/packer
        run: packer init .

      - name: Packer build
        working-directory: infra/packer
        run: |
          packer build \
            -var "version=${VERSION}" \
            -var "ssh_private_key_file=./keys/packer.pem" \
            .

      - name: Confirmar artefato gerado
        run: |
          ls -lh infra/packer/output/
          test -f "infra/packer/output/${IMAGE_FILE}"

      # ─── 8. Upload pra OCI Object Storage ────────────────────────────
      - name: Install OCI CLI
        run: |
          pip install --upgrade oci-cli

      - name: Upload image to OCI bucket
        run: |
          oci os object put \
            --namespace "${OCI_NAMESPACE}" \
            --bucket-name "${OCI_BUCKET}" \
            --name "${IMAGE_FILE}" \
            --file "infra/packer/output/${IMAGE_FILE}" \
            --force \
            --auth api_key

      - name: Print download URL
        run: |
          echo "Imagem disponível em:"
          echo "https://objectstorage.${OCI_CLI_REGION}.oraclecloud.com/n/${OCI_NAMESPACE}/b/${OCI_BUCKET}/o/${IMAGE_FILE}"
